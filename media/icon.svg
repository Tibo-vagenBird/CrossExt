<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Chip top face (thin isometric) -->
  <polygon points="12,6 21,10 12,14 3,10" fill="currentColor" opacity="0.85"/>
  <!-- Chip right side face (very thin) -->
  <polygon points="21,10 21,11.5 12,15.5 12,14" fill="currentColor" opacity="0.6"/>
  <!-- Chip left side face (very thin) -->
  <polygon points="3,10 12,14 12,15.5 3,11.5" fill="currentColor" opacity="0.7"/>

  <!-- Pins bottom-right edge (long) -->
  <line x1="13.5" y1="15.2" x2="13.5" y2="20" stroke="currentColor" stroke-width="0.7"/>
  <line x1="15" y1="14.5" x2="15" y2="19.3" stroke="currentColor" stroke-width="0.7"/>
  <line x1="16.5" y1="13.8" x2="16.5" y2="18.6" stroke="currentColor" stroke-width="0.7"/>
  <line x1="18" y1="13.1" x2="18" y2="17.9" stroke="currentColor" stroke-width="0.7"/>
  <line x1="19.5" y1="12.4" x2="19.5" y2="17.2" stroke="currentColor" stroke-width="0.7"/>

  <!-- Pins bottom-left edge (long) -->
  <line x1="10.5" y1="15.2" x2="10.5" y2="20" stroke="currentColor" stroke-width="0.7"/>
  <line x1="9" y1="14.5" x2="9" y2="19.3" stroke="currentColor" stroke-width="0.7"/>
  <line x1="7.5" y1="13.8" x2="7.5" y2="18.6" stroke="currentColor" stroke-width="0.7"/>
  <line x1="6" y1="13.1" x2="6" y2="17.9" stroke="currentColor" stroke-width="0.7"/>
  <line x1="4.5" y1="12.4" x2="4.5" y2="17.2" stroke="currentColor" stroke-width="0.7"/>

  <!-- Inner face on chip -->
  <polygon points="12,7.5 17.5,10 12,12.5 6.5,10" fill="currentColor" opacity="0.5"/>

  <!-- "C" cutout -->
  <text x="12" y="11.2" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="4.5" fill="black" opacity="0.4">C</text>
</svg>
